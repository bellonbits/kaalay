# Kaalay production stack.
#
# Secrets come from a `.env` file next to this compose file (gitignored).
# Copy `.env.example` to `.env` on the server and set real values.
#
# All inter-service addresses are STATIC IPs on a dedicated subnet so the
# stack keeps working even if podman's container DNS (aardvark-dns) breaks.
# Only the backend (3000) is published publicly; everything else is
# localhost-only or unpublished.

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: kaalay-postgres
    restart: always
    environment:
      POSTGRES_DB: kaalay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      kaalay_net:
        ipv4_address: 10.90.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d kaalay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: kaalay-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      kaalay_net:
        ipv4_address: 10.90.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: docker.io/library/adminer
    container_name: kaalay-adminer
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      kaalay_net:
        ipv4_address: 10.90.0.14

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: kaalay-backend
    restart: always
    ports:
      - "80:3000"
    environment:
      DATABASE_HOST: 10.90.0.10
      DATABASE_PORT: 5432
      DATABASE_USER: admin
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      DATABASE_NAME: kaalay
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD:-password}@10.90.0.10:5432/kaalay
      REDIS_HOST: 10.90.0.11
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      W3W_API_KEY: ${W3W_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_MAPS_SERVER_KEY: ${GOOGLE_MAPS_SERVER_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      kaalay_net:
        ipv4_address: 10.90.0.20
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  kaalay_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.90.0.0/24
          gateway: 10.90.0.1

volumes:
  postgres_data:
  redis_data:
  uploads_data:
