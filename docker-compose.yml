services:
  postgres:
    image: postgres:15-alpine
    container_name: kaalay-postgres
    restart: always
    environment:
      POSTGRES_DB: kaalay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kaalay-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    container_name: kaalay-adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
