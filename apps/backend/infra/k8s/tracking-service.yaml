---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-tracking
  namespace: suqafuran-express
  labels:
    app: tracking
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: tracking
  template:
    metadata:
      labels:
        app: tracking
    spec:
      containers:
      - name: tracking
        image: ghcr.io/suqafuran/express/tracking:v1.0.0
        ports:
        - name: http
          containerPort: 8007
        env:
        - name: PORT
          value: "8007"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tracking-secrets
              key: database-url
        - name: REDIS_ADDR
          value: redis-service:6379
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: tracking-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 800m
            memory: 1Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: tracking-service
  namespace: suqafuran-express
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8007
    targetPort: http
  selector:
    app: tracking

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tracking-hpa
  namespace: suqafuran-express
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: svc-tracking
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
