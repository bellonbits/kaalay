<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Drop shadow -->
  <ellipse cx="32" cy="60" rx="16" ry="4" fill="rgba(0,0,0,0.18)"/>
  <!-- Body -->
  <rect x="6" y="30" width="52" height="22" rx="6" fill="#F5C518"/>
  <!-- Cab roof -->
  <path d="M18 30 L22 16 Q24 12 28 12 L36 12 Q40 12 42 16 L46 30 Z" fill="#F5C518"/>
  <!-- Roof sign (TAXI) -->
  <rect x="24" y="10" width="16" height="7" rx="2" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <text x="32" y="16" text-anchor="middle" font-size="5" font-weight="bold" fill="#222" font-family="Arial">TAXI</text>
  <!-- Windows -->
  <rect x="22" y="18" width="10" height="10" rx="2" fill="#AEE0F0"/>
  <rect x="34" y="18" width="10" height="10" rx="2" fill="#AEE0F0"/>
  <!-- Checker stripe -->
  <rect x="6" y="38" width="52" height="5" fill="#333" rx="0"/>
  <rect x="6" y="38" width="8" height="5" fill="#F5C518"/>
  <rect x="22" y="38" width="8" height="5" fill="#F5C518"/>
  <rect x="38" y="38" width="8" height="5" fill="#F5C518"/>
  <rect x="54" y="38" width="4" height="5" fill="#F5C518" rx="0"/>
  <!-- Wheels -->
  <circle cx="16" cy="52" r="7" fill="#333"/>
  <circle cx="16" cy="52" r="3.5" fill="#aaa"/>
  <circle cx="48" cy="52" r="7" fill="#333"/>
  <circle cx="48" cy="52" r="3.5" fill="#aaa"/>
  <!-- Headlight -->
  <rect x="6" y="34" width="5" height="3" rx="1.5" fill="#fffbe6"/>
  <!-- Tail light -->
  <rect x="53" y="34" width="5" height="3" rx="1.5" fill="#ff4444"/>
</svg>
