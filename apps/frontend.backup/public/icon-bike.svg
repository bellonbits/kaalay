<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="61" rx="18" ry="3" fill="rgba(0,0,0,0.18)"/>
  <!-- Rear wheel -->
  <circle cx="12" cy="46" r="10" fill="#2C3E50"/>
  <circle cx="12" cy="46" r="5" fill="#95a5a6"/>
  <circle cx="12" cy="46" r="2" fill="#2C3E50"/>
  <!-- Front wheel -->
  <circle cx="52" cy="46" r="10" fill="#2C3E50"/>
  <circle cx="52" cy="46" r="5" fill="#95a5a6"/>
  <circle cx="52" cy="46" r="2" fill="#2C3E50"/>
  <!-- Frame / engine body -->
  <path d="M12 46 L20 28 L36 26 L48 36 L52 46" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Fuel tank (brown/orange) -->
  <ellipse cx="32" cy="26" rx="10" ry="6" fill="#C0392B"/>
  <!-- Seat -->
  <path d="M22 26 Q32 20 42 22" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Engine block -->
  <rect x="22" y="32" width="14" height="10" rx="3" fill="#7f8c8d"/>
  <!-- Exhaust pipe -->
  <path d="M22 40 L8 48" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handlebar -->
  <path d="M44 24 Q50 20 54 22" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Front fork -->
  <line x1="48" y1="34" x2="52" y2="46" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <!-- Headlight -->
  <circle cx="54" cy="32" r="3.5" fill="#fffbe6" stroke="#aaa" stroke-width="1"/>
  <!-- Mirror -->
  <circle cx="44" cy="22" r="2" fill="#AEE0F0" stroke="#555" stroke-width="1"/>
  <!-- Rear mudguard -->
  <path d="M12 36 Q6 40 10 46" stroke="#8B4513" stroke-width="2" fill="none"/>
</svg>
